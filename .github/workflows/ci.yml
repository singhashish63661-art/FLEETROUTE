name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Go Backend Tests ───────────────────────────────────────────────────────
  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install dependencies
        run: go work sync

      - name: Vet
        run: |
          for mod in pkg protocols ingestion-service stream-processor api-service websocket-service; do
            echo ">>> $mod"
            cd $mod && go vet ./... && cd ..
          done

      - name: Test — pkg
        run: cd pkg && go test -race ./... -v

      - name: Test — protocols
        run: cd protocols && go test -race ./... -v

      - name: Build — ingestion-service
        run: cd ingestion-service && go build ./cmd/...

      - name: Build — stream-processor
        run: cd stream-processor && go build ./cmd/...

      - name: Build — api-service
        run: cd api-service && go build ./cmd/...

      - name: Build — websocket-service
        run: cd websocket-service && go build ./cmd/...

  # ── Frontend Build ─────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  # ── Docker Build (smoke test) ──────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-go, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ingestion-service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ingestion-service/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build api-service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api-service/Dockerfile
          push: false

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
