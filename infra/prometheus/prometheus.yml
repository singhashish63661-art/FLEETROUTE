global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ingestion-service'
    static_configs:
      - targets: ['ingestion:9090']

  - job_name: 'stream-processor'
    static_configs:
      - targets: ['stream-processor:9091']

  - job_name: 'api-service'
    static_configs:
      - targets: ['api:9092']

  - job_name: 'websocket-service'
    static_configs:
      - targets: ['websocket:9093']

  - job_name: 'nats'
    static_configs:
      - targets: ['nats:7777']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']
